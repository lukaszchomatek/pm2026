x-hf-service: &hf-service
  build: ./hf-model-service
  environment:
    MODEL_REVISION: main
    USE_GPU: "1"
    LOG_LEVEL: INFO
    HF_HOME: /hf
  volumes:
    - hf_cache:/hf
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read(); sys.exit(0)"
      ]
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 120s
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:8
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  users:
    build: ./users
    container_name: users
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-jwt-key
    depends_on:
      - redis

  posts:
    build: ./posts
    container_name: posts
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URL: mongodb://mongo:27017/postsdb
      JWT_SECRET: super-secret-jwt-key
      USERS_URL: http://users:3001
      SENTIMENT_URL: http://sentiment:8000/predictsentiment
      TOXICITY_URL: http://toxicity:8000/predicttoxicity
      ZEROSHOT_URL: http://zeroshot:8000/predictzeroshot
      ZERO_SHOT_LABELS: '["question","complaint","opinion","announcement","spam"]'
      ZERO_SHOT_MULTI_LABEL: "1"
      MODEL_TIMEOUT_MS: 10000
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLASSIFICATION_EXCHANGE: classification
    depends_on:
      mongo:
        condition: service_healthy
      sentiment:
        condition: service_healthy
      toxicity:
        condition: service_healthy
      zeroshot:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  sentiment:
    <<: *hf-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    container_name: sentiment
    ports:
      - "8000:8000"
    environment:
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
      SERVICE_KIND: sentiment
      MODEL_ID: cardiffnlp/twitter-roberta-base-sentiment-latest
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLASSIFICATION_EXCHANGE: classification

  toxicity:
    <<: *hf-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    container_name: toxicity
    ports:
      - "8001:8000"
    environment:
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
      SERVICE_KIND: toxicity
      MODEL_ID: unitary/toxic-bert
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLASSIFICATION_EXCHANGE: classification

  zeroshot:
    <<: *hf-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    container_name: zeroshot
    ports:
      - "8002:8000"
    environment:
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
      SERVICE_KIND: zeroshot
      MODEL_ID: facebook/bart-large-mnli
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLASSIFICATION_EXCHANGE: classification
volumes:
  mongo_data:
  hf_cache:
