services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo:8
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  users:
    build: ./users
    container_name: users
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-jwt-key
    depends_on:
      - redis

  posts:
    build: ./posts
    container_name: posts
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URL: mongodb://mongo:27017/postsdb
      JWT_SECRET: super-secret-jwt-key
      SENTIMENT_URL: http://sentiment:8000/predictsentiment
      TOXICITY_URL: http://toxicity:8000/predicttoxicity
      ZEROSHOT_URL: http://zeroshot:8000/predictzeroshot
      ZERO_SHOT_LABELS: '["question","complaint","opinion","announcement","spam"]'
      ZERO_SHOT_MULTI_LABEL: "1"
      MODEL_TIMEOUT_MS: 10000
    depends_on:
      - mongo
      - sentiment
      - toxicity
      - zeroshot

  sentiment:
    build: ./hf-model-service
    container_name: sentiment
    ports:
      - "8000:8000"
    environment:
      SERVICE_KIND: sentiment
      MODEL_ID: cardiffnlp/twitter-roberta-base-sentiment-latest
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
    volumes:
      - hf_cache:/hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  toxicity:
    build: ./hf-model-service
    container_name: toxicity
    ports:
      - "8001:8000"
    environment:
      SERVICE_KIND: toxicity
      MODEL_ID: unitary/toxic-bert
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
    volumes:
      - hf_cache:/hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  zeroshot:
    build: ./hf-model-service
    container_name: zeroshot
    ports:
      - "8002:8000"
    environment:
      SERVICE_KIND: zeroshot
      MODEL_ID: facebook/bart-large-mnli
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
    volumes:
      - hf_cache:/hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
volumes:
  mongo_data:
  hf_cache: