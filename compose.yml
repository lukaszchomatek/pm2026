x-hf-service: &hf-service
  build: ./hf-model-service
  environment:
    MODEL_REVISION: main
    USE_GPU: "1"
    LOG_LEVEL: INFO
    HF_HOME: /hf
  volumes:
    - hf_cache:/hf
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read(); sys.exit(0)"
      ]
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 120s
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  mongo:
    image: mongo:8
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  traefik:
    image: traefik:v3.6.2
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "8080:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock.raw:/var/run/docker.sock:ro

  users:
    build: ./users
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-jwt-key
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy

  posts:
    build: ./posts
    # posts is intentionally exposed only inside the Compose network so Traefik
    # can load-balance multiple replicas (host ports would collide when scaled).
    expose:
      - "3002"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.posts.rule=PathPrefix(`/`)"
      - "traefik.http.routers.posts.entrypoints=web"
      - "traefik.http.services.posts.loadbalancer.server.port=3002"
    environment:
      PORT: 3002
      MONGO_URL: mongodb://mongo:27017/postsdb
      JWT_SECRET: super-secret-jwt-key
      USERS_URL: http://users:3001
      SENTIMENT_URL: http://sentiment:8000/predictsentiment
      TOXICITY_URL: http://toxicity:8000/predicttoxicity
      ZEROSHOT_URL: http://zeroshot:8000/predictzeroshot
      ZERO_SHOT_LABELS: '["question","complaint","opinion","announcement","spam"]'
      ZERO_SHOT_MULTI_LABEL: "1"
      MODEL_TIMEOUT_MS: 10000
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLASSIFICATION_EXCHANGE: classification
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
      users:
        condition: service_started
      sentiment:
        condition: service_healthy
      toxicity:
        condition: service_healthy
      zeroshot:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      traefik:
        condition: service_started

  sentiment:
    <<: *hf-service
    expose:
      - "8000"
    environment:
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
      SERVICE_KIND: sentiment
      MODEL_ID: cardiffnlp/twitter-roberta-base-sentiment-latest
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLASSIFICATION_EXCHANGE: classification
      FAIL_MODE: none
      PREFETCH_COUNT: "1"
      TOXICITY_DELAY_MS: "0"
    depends_on:
      rabbitmq:
        condition: service_healthy

  toxicity:
    <<: *hf-service
    expose:
      - "8000"
    environment:
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
      SERVICE_KIND: toxicity
      MODEL_ID: unitary/toxic-bert
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLASSIFICATION_EXCHANGE: classification
      FAIL_MODE: none
      PREFETCH_COUNT: "1"
      TOXICITY_DELAY_MS: "0"
    depends_on:
      rabbitmq:
        condition: service_healthy

  zeroshot:
    <<: *hf-service
    expose:
      - "8000"
    environment:
      MODEL_REVISION: main
      USE_GPU: "1"
      LOG_LEVEL: INFO
      HF_HOME: /hf
      SERVICE_KIND: zeroshot
      MODEL_ID: facebook/bart-large-mnli
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLASSIFICATION_EXCHANGE: classification
      FAIL_MODE: none
      PREFETCH_COUNT: "1"
      TOXICITY_DELAY_MS: "0"
    depends_on:
      rabbitmq:
        condition: service_healthy

  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - redis-exporter
      - rabbitmq

  alloy:
    image: grafana/alloy:v1.8.3
    container_name: alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    depends_on:
      - loki
      - prometheus
    volumes:
      - /var/run/docker.sock.raw:/var/run/docker.sock:ro
      - ./observability/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    depends_on:
      - loki
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro

volumes:
  redis_data:
  mongo_data:
  hf_cache:
  loki_data:
  prometheus_data:
  grafana_data:
  alloy_data: