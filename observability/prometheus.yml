global:
  scrape_interval: 10s

scrape_configs:
  - job_name: posts
    static_configs:
      - targets: ["posts:3002"]
    metrics_path: /metrics

  - job_name: users
    static_configs:
      - targets: ["users:3001"]
    metrics_path: /metrics

  - job_name: classifiers
    static_configs:
      - targets: ["sentiment:8000", "toxicity:8000", "zeroshot:8000"]
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]